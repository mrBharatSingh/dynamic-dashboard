<form [formGroup]="myForm" class="dashboard-tab-form">
  <div class="form-field">
    <label for="dashboardName">Dashboard Name</label>
    <input
      id="dashboardName"
      type="text"
      pInputText
      formControlName="name"
      placeholder="Enter dashboard name"
      class="w-full"
    />
  </div>
</form>

<div class="dialog-actions">
  <button
    pButton
    pRipple
    type="button"
    label="Cancel"
    class="p-button-text"
    (click)="onCancel()"
  ></button>
  <button
    pButton
    pRipple
    type="button"
    label="Create"
    icon="pi pi-check"
    [disabled]="myForm.invalid"
    (click)="submit()"
  ></button>
</div>
