<div class="notifications-panel">
  <div class="notifications-header">
    <h4><i class="pi pi-bell"></i> Notifications</h4>
  </div>
  <div class="notification-list">
    <div class="notification-item priority-high">
      <div class="notification-dot high"></div>
      <div class="notification-body">
        <span class="notification-text">Please complete Time Sheet</span>
        <span class="notification-date">{{ date | date: 'mediumDate' }}</span>
      </div>
    </div>
    <div class="notification-item priority-success">
      <div class="notification-dot success"></div>
      <div class="notification-body">
        <span class="notification-text">Complete your training</span>
        <span class="notification-date">{{ date | date: 'mediumDate' }}</span>
      </div>
    </div>
    <div class="notification-item priority-warning">
      <div class="notification-dot warning"></div>
      <div class="notification-body">
        <span class="notification-text">Test notification</span>
        <span class="notification-date">{{ date | date: 'mediumDate' }}</span>
      </div>
    </div>
  </div>
</div>
