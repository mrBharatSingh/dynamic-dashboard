<form [formGroup]="myForm" class="shortcut-form">
  <div class="form-field">
    <label for="name">Name</label>
    <input
      id="name"
      type="text"
      pInputText
      formControlName="name"
      placeholder="Enter shortcut name"
      class="w-full"
    />
  </div>

  <div class="form-field">
    <label for="url">URL</label>
    <input
      id="url"
      type="text"
      pInputText
      formControlName="url"
      placeholder="https://example.com"
      class="w-full"
    />
  </div>

  <div class="form-row">
    <div class="form-field flex-1">
      <label>Background Color</label>
      <div class="color-picker-wrapper">
        <p-colorPicker
          [(ngModel)]="selectedColor"
          [ngModelOptions]="{ standalone: true }"
          (onChange)="onColorChange($event.value)"
        ></p-colorPicker>
        <span class="color-hex">{{ selectedColor }}</span>
      </div>
    </div>

    <div class="form-field flex-1">
      <label for="boardName">Dashboard</label>
      <p-dropdown
        [options]="boardList"
        formControlName="boardName"
        placeholder="Select Dashboard"
        [style]="{ width: '100%' }"
      ></p-dropdown>
    </div>
  </div>
</form>

<div class="dialog-actions">
  <button
    pButton
    pRipple
    type="button"
    label="Cancel"
    class="p-button-text"
    (click)="onCancel()"
  ></button>
  <button
    pButton
    pRipple
    type="button"
    label="Save"
    icon="pi pi-check"
    (click)="submit()"
  ></button>
</div>
