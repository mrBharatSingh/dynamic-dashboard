<div class="links-container">
  <p-toast></p-toast>
  <p-card styleClass="links-card">
    <ng-template pTemplate="header">
      <div class="card-header">
        <div class="header-left">
          <i class="pi pi-book header-icon"></i>
          <h3>Address Book</h3>
        </div>
        <div class="header-actions">
          <button pButton pRipple type="button" icon="pi pi-refresh" label="Refresh"
            class="p-button-outlined p-button-sm" [loading]="loading" (click)="refresh()"
            pTooltip="Reload tools from server"></button>
          <a routerLink="/admin" pButton pRipple type="button" icon="pi pi-shield" label="Admin"
            class="p-button-outlined p-button-secondary p-button-sm" pTooltip="Manage tools (Admin Panel)"></a>
        </div>
      </div>
    </ng-template>

    <!-- Search -->
    <div class="search-box">
      <span class="p-input-icon-left" style="width: 100%">
        <i class="pi pi-search"></i>
        <input type="text" pInputText placeholder="Search tools..." style="width: 100%" (input)="applyFilter($event)" />
      </span>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
      <p>Loading tools…</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && (!linksData || linksData.length === 0)" class="empty-state">
      <i class="pi pi-inbox"></i>
      <h4>No URLs Found</h4>
      <p>Visit the <a routerLink="/admin">Admin Panel</a> to add tools.</p>
    </div>

    <!-- Data Table -->
    <p-table *ngIf="!loading && linksData && linksData.length > 0" #dt [value]="linksData" [paginator]="true"
      [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [globalFilterFields]="['toolName', 'description', 'url']"
      [filterDelay]="0" styleClass="p-datatable-sm p-datatable-striped" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="toolName" style="width: 25%">
            Tool Name <p-sortIcon field="toolName"></p-sortIcon>
          </th>
          <th pSortableColumn="description">
            Description <p-sortIcon field="description"></p-sortIcon>
          </th>
          <th style="width: 100px; text-align: center">Open</th>
          <th style="width: 140px; text-align: center">Add to Dashboard</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>
            <span class="tool-name">{{ row.toolName }}</span>
          </td>
          <td>{{ row.description }}</td>
          <td style="text-align: center">
            <button pButton pRipple type="button" icon="pi pi-external-link"
              class="p-button-rounded p-button-text p-button-sm" (click)="goToLink(row.url)"
              pTooltip="Open link"></button>
          </td>
          <td style="text-align: center">
            <button pButton pRipple type="button" icon="pi pi-bookmark"
              class="p-button-rounded p-button-text p-button-success p-button-sm" (click)="addToDashboard(row)"
              pTooltip="Add to dashboard"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center p-4">
            No matching records found
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<!-- Add Shortcut Dialog -->
<p-dialog header="Add to Dashboard" [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '550px' }"
  [draggable]="false" [resizable]="false">
  <app-add-new-shortcut *ngIf="showAddDialog" [data]="dialogData" (submitted)="onShortcutDialogClose($event)"
    (cancelled)="showAddDialog = false"></app-add-new-shortcut>
</p-dialog>
