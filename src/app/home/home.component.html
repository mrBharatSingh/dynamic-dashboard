<div class="home-container">
  <p-tabView [(activeIndex)]="selectedTabIndex" styleClass="modern-tabs">
    <p-tabPanel
      *ngFor="let board of boardlist; let i = index"
      [header]="board"
      [leftIcon]="'pi pi-th-large'"
    >
      <app-dashboard
        *ngIf="i == selectedTabIndex"
        [dashboardName]="board"
      ></app-dashboard>
    </p-tabPanel>
    <p-tabPanel header="Links" leftIcon="pi pi-link">
      <app-links></app-links>
    </p-tabPanel>
  </p-tabView>
</div>
